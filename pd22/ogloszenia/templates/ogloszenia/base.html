<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Blog</title></head>
  <body>
    {% if user.is_authenticated %}
      Zalogowany: {{ user }} |
      <a href="{% url 'account_logout' %}">Wyloguj</a>
    {% else %}
      <a href="{% url 'account_login' %}">Zaloguj</a> |
      <a href="{% url 'account_signup' %}">Rejestracja</a>
    {% endif %}
    <hr>
    {% block content %}{% endblock %}
  </body>
</html>
